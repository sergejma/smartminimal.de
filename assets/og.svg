  <!-- live tag -->
  <circle cx="918" cy="98" r="6" fill="#6fae7a"/>
  <text x="936" y="105" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="600" letter-spacing="1.5" fill="#ece8df" fill-opacity="0.55">SYSTEM LÄUFT</text>

